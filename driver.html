<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <title>Driver Panel - MSRTC Bus Tracking</title>

   <link rel="stylesheet" href="style.css">

</head>

<body class="driver-page">
<div class="driver-card">
    <h1 class="driver-title">Driver Panel</h1>

    <label>Bus Number</label><br>
    <input type="text" id="busNo" placeholder="MH12AB1234"><br><br>

    <label>Route</label><br>
    <select id="route">
        <option value="">Select Route</option>
        <option value="Pune - Mumbai">Pune - Mumbai</option>
        <option value="Pune - Nashik">Pune - Nashik</option>
        <option value="Kolhapur - Pune">Kolhapur - Pune</option>
    </select><br><br>

    <button id="startTracking">Start Tracking</button>
    <button id="stopTracking" style="display:none;">Stop Tracking</button>

    <div id="status"></div>
    <div class="status-indicator">
    <span class="status-dot status-offline" id="statusDot"></span>
    <span id="statusText">Offline</span>
</div>

    <form action="index.html" method="get" class="back-form">
    <button type="submit" class="back-btn">Back</button>
</form> </div>


    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- Shared Firebase config -->
    <script src="firebase.js"></script>

    <!-- Driver logic -->
    <script src="driver.js"></script>

</body>

</html>
